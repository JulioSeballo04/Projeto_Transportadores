<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balofinho Transportadores – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-mark">B</div>
      <div class="auth-logo-name">Balofinho Transportadores</div>
      <div class="auth-logo-sub">Sistema de Gestão</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Criar Conta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="fg">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="fg">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
      <div class="divider">ou</div>
      <button class="btn-google" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Entrar com Google
      </button>
    </div>

    <!-- REGISTRO -->
    <div class="form-panel" id="panel-register">
      <div class="fg">
        <label>Nome Completo</label>
        <input type="text" id="reg-nome" placeholder="Seu nome completo">
      </div>
      <div class="fg">
        <label>E-mail</label>
        <input type="email" id="reg-email" placeholder="seu@email.com">
      </div>
      <div class="fg">
        <label>Data de Nascimento</label>
        <input type="date" id="reg-nasc">
      </div>
      <div class="fg">
        <label>Senha</label>
        <input type="password" id="reg-senha" placeholder="Mínimo 8 caracteres">
      </div>
      <button class="btn-primary" onclick="doRegister()">Criar Conta</button>
    </div>

  </div>

  <div id="toast"></div>

  <script src="login.js"></script>
</body>
</html>
