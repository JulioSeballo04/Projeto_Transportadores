<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balofinho Transportadores – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-mark">B</div>
      <div class="auth-logo-name">Balofinho Transportadores</div>
      <div class="auth-logo-sub">Sistema de Gestão</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Criar Conta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="fg"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com"></div>
      <div class="fg"><label>Senha</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
    </div>

    <!-- REGISTRO -->
    <div class="form-panel" id="panel-register">
      <div class="fg"><label>Nome Completo</label><input type="text" id="reg-nome" placeholder="Seu nome completo"></div>
      <div class="fg"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com"></div>
      <div class="fg"><label>Data de Nascimento</label><input type="date" id="reg-nasc"></div>
      <div class="fg"><label>Senha</label><input type="password" id="reg-senha" placeholder="Mínimo 8 caracteres"></div>
      <button class="btn-primary" onclick="doRegister()">Criar Conta</button>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="login.js"></script>
</body>
</html>
